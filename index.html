<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Dupe Check SW - IR and SaaS</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23grad)'/%3E%3Cg fill='white'%3E%3Crect x='15' y='25' width='35' height='35' rx='5' opacity='0.9'/%3E%3Crect x='50' y='25' width='35' height='35' rx='5' opacity='0.6'/%3E%3Cpath d='M 30 70 L 40 80 L 60 55' stroke='white' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/g%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="styles.css">
    <!-- SheetJS Library for Excel Processing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Auto Dupe Check SW - IR and SaaS</h1>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'dupeIR')">Dupe IR</button>
            <button class="tab-button" onclick="openTab(event, 'dupeSaaS')">Dupe SaaS</button>
        </div>

        <div id="dupeIR" class="tab-content active">
            <div class="upload-section">
                <h2>Dupe IR</h2>
                <p>Por favor, anexe o report QMF IR em formato Excel:</p>
                
                <div class="file-upload-wrapper">
                    <input type="file" id="irFileInput" accept=".xlsx,.xls" onchange="handleIRFileUpload(event)">
                    <label for="irFileInput" class="file-upload-label">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span>Clique para selecionar o arquivo Excel</span>
                    </label>
                </div>

                <div id="irFileInfo" class="file-info" style="display: none;">
                    <div class="file-details">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <div class="file-text">
                            <strong id="irFileName"></strong>
                            <span id="irFileSize"></span>
                        </div>
                        <button onclick="clearIRFile()" class="clear-button">✕</button>
                    </div>
                </div>

                <div id="irProcessing" class="processing-section" style="display: none;">
                    <div class="spinner"></div>
                    <p>Processando arquivo...</p>
                </div>

                <div id="irResults" class="results-section" style="display: none;">
                    <h3>Resultados</h3>
                    <div id="irResultsContent"></div>
                </div>
            </div>
        </div>

        <div id="dupeSaaS" class="tab-content">
            <div class="upload-section">
                <h2>Dupe SaaS</h2>
                <p class="placeholder-text">Funcionalidade em desenvolvimento. Aguardando instruções...</p>
            </div>
        </div>

        <footer class="app-footer">
            <div class="footer-content">
                <img src="IBM-Logo.png" alt="IBM Logo" class="footer-logo">
                <p class="footer-text">Developed by <strong>Lucas Galdino</strong></p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
